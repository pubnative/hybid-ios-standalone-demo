name: Update HyBid

# Triggered by the "Release HyBid SDK" workflow in pubnative-hybid-ios-sdk-private
# via repository_dispatch. Bumps pod 'HyBid' in all Podfiles, runs pod update,
# and opens a PR to master.
#
# Secrets required:
#   SLACK_BOT_TOKEN — Slack bot token (xoxb-...)
#   SLACK_IOS_RELEASES_CHANNEL   — #hybid-ios-releases channel ID

on:
  repository_dispatch:
    types: [hybid-release]

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash -o pipefail {0}

jobs:
  update:
    name: "Bump HyBid and open PR"
    runs-on: macos-latest
    env:
      HYBID_VERSION: ${{ github.event.client_payload.hybid_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump HyBid version in Podfiles and run pod update
        run: |
          echo "Updating pod 'HyBid' to $HYBID_VERSION in all Podfiles…"
          find . -name Podfile | sort | while read podfile; do
            dir=$(dirname "$podfile")
            echo "  → $podfile"
            sed -i '' "s|pod 'HyBid', '[^']*'|pod 'HyBid', '$HYBID_VERSION'|g" "$podfile"
            (cd "$dir" && pod update HyBid)
          done

      - name: Commit, push branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-hybid-${HYBID_VERSION}"

          # Always reset branch to master — this branch belongs to automation
          git checkout -B "$BRANCH"

          git add -A

          # Skip if nothing changed vs master
          if git diff --cached --quiet; then
            echo "No changes to commit — already up to date for v$HYBID_VERSION"
            exit 0
          fi

          git commit -m "Pod HyBid v: $HYBID_VERSION is added"

          # Force push — overwrites any manual changes on this branch
          git push --force-with-lease origin "$BRANCH" 2>/dev/null \
            || git push --force origin "$BRANCH"

          # Open PR only if one doesn't already exist
          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "PR already exists for $BRANCH — skipping"
          else
            gh pr create \
              --title "Pod HyBid v: $HYBID_VERSION is added" \
              --body  "Automated update: bumps HyBid to v$HYBID_VERSION and runs pod update." \
              --base  master \
              --head  "$BRANCH"
          fi

          # Capture PR URL for Slack notification
          PR_URL=$(gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json url --jq .url 2>/dev/null || echo "")
          echo "PR_URL=$PR_URL"     >> "$GITHUB_ENV"
          echo "PR_OPENED=true"    >> "$GITHUB_ENV"

      # ────────────────────────────────────────────────────────────────────────
      # Slack notifications
      # ────────────────────────────────────────────────────────────────────────

      - name: Slack success notification
        if: success() && env.PR_OPENED == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_IOS_RELEASES_CHANNEL: ${{ secrets.SLACK_IOS_RELEASES_CHANNEL }}
          STATUS: success
          DEMO_TITLE: "HyBid Standalone Demo"
        run: bash .github/scripts/notify-slack.sh

      - name: Slack failure notification
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_IOS_RELEASES_CHANNEL: ${{ secrets.SLACK_IOS_RELEASES_CHANNEL }}
          STATUS: failure
          DEMO_TITLE: "HyBid Standalone Demo"
        run: bash .github/scripts/notify-slack.sh
